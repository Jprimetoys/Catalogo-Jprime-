<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Jprime Toys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="top-bar">

    <div class="promo-banner">
      <span>10% de descuento en toda la página. Válido hasta el 8 de mayo.</span>
    </div>

    <div class="header">
      <div class="logo-container">
        <a href="." class="logo-link">
          <img src="logo.JPG" alt="Logo Jprime Toys" class="logo">
        </a>
        <p class="logo-subtitle">"Cumpliendo sueños de coleccionistas"</p>
      </div>
      <h1>CATÁLOGO</h1>
    </div>

    <div class="search-wrapper">
      <div class="search-box">
        <input type="text" id="buscador" onkeyup="buscarProducto()" placeholder="Buscar por nombre...">
        <button id="btn-limpiar" class="btn-limpiar hidden" onclick="limpiarBusqueda()">×</button>
      </div>
    </div>

    <div class="filter-row">

      <div class="filtros-wrapper">
        <button id="btn-filtros">Filtros ▼</button>
        <div id="filtros-opciones" class="filtros hidden">
          <button class="filtro-btn activo" data-cat="all"        onclick="filtrarCategoria('all')">Todos</button>
          <button class="filtro-btn" data-cat="kingdom"           onclick="filtrarCategoria('kingdom')">Kingdom/Beast Wars</button>
          <button class="filtro-btn" data-cat="siege"             onclick="filtrarCategoria('siege')">Siege</button>
          <button class="filtro-btn" data-cat="legacy"            onclick="filtrarCategoria('legacy')">Legacy</button>
          <button class="filtro-btn" data-cat="movieverse"        onclick="filtrarCategoria('movieverse')">Movieverse</button>
          <button class="filtro-btn" data-cat="armada"            onclick="filtrarCategoria('armada')">Armada</button>
          <button class="filtro-btn" data-cat="g1"                onclick="filtrarCategoria('g1')">G1</button>
          <button class="filtro-btn" data-cat="combiner"          onclick="filtrarCategoria('combiner')">Combiner</button>
          <button class="filtro-btn" data-cat="3p"                onclick="filtrarCategoria('3p')">3P</button>
          <button class="filtro-btn" data-cat="cybertron"         onclick="filtrarCategoria('cybertron')">Cybertron</button>
          <button class="filtro-btn" data-cat="energon"           onclick="filtrarCategoria('energon')">Energon</button>
          <button class="filtro-btn" data-cat="tfp"               onclick="filtrarCategoria('tfp')">TFP</button>
          <button class="filtro-btn" data-cat="cw"                onclick="filtrarCategoria('cw')">CW</button>
          <button class="filtro-btn" data-cat="tr"                onclick="filtrarCategoria('tr')">TR</button>
          <button class="filtro-btn" data-cat="gen"               onclick="filtrarCategoria('gen')">Generations</button>
          <button class="filtro-btn" data-cat="potp"              onclick="filtrarCategoria('potp')">POTP</button>
          <button class="filtro-btn" data-cat="aotp"              onclick="filtrarCategoria('aotp')">AOTP</button>
          <button class="filtro-btn" data-cat="lego"              onclick="filtrarCategoria('lego')">Lego</button>
          <button class="filtro-btn" data-cat="marvel"            onclick="filtrarCategoria('marvel')">Marvel</button>
          <button class="filtro-btn" data-cat="off"               onclick="filtrarCategoria('off')">🏷️ Ofertas</button>
        </div>
      </div>

      <div class="filtros-wrapper">
        <button id="btn-escalas">Escalas ▼</button>
        <div id="escalas-opciones" class="filtros hidden">
          <button class="filtro-btn" data-cat="mainline"    onclick="filtrarCategoria('mainline')">Mainline</button>
          <button class="filtro-btn" data-cat="legends"     onclick="filtrarCategoria('legends')">Legends</button>
          <button class="filtro-btn" data-cat="masterpiece" onclick="filtrarCategoria('masterpiece')">Masterpiece</button>
        </div>
      </div>

    </div>

  </div>

  <div class="toolbar">
    <span id="contador" class="contador"></span>
    <div class="sort-wrapper">
      <span>Ordenar:</span>
      <button class="sort-btn activo" id="sort-def"  onclick="ordenar('default')">Original</button>
      <button class="sort-btn"        id="sort-asc"  onclick="ordenar('asc')">Precio ↑</button>
      <button class="sort-btn"        id="sort-desc" onclick="ordenar('desc')">Precio ↓</button>
    </div>
  </div>

  <div id="paginacion-top" class="paginacion"></div>
  <div id="productos"></div>
  <div id="paginacion" class="paginacion"></div>

  <div id="toast" class="toast hidden">¡Enlace copiado!</div>

  <button id="btn-volver-arriba" class="btn-volver-arriba hidden" onclick="volverArriba()">↑</button>

  <div class="contacto-final-wrapper">
    <button class="btn-contacto-final">Contáctame</button>
    <div class="contacto-final-opciones hidden">
      <div class="contacto-panel">
        <strong>Contáctame</strong>
        <a class="contacto-link whatsapp" href="https://wa.me/573158261632?text=Hola,%20vi%20tu%20cat%C3%A1logo%20y%20quiero%20más%20información%20🤠" target="_blank">WhatsApp</a>
      </div>
    </div>
  </div>

  <div id="lightbox" class="lightbox hidden">
    <button id="lightbox-close" class="lightbox-close">&times;</button>
    <img id="lightbox-img" class="lightbox-img" src="" alt="Imagen ampliada">
  </div>

  <div class="sigueme-section">
    <div class="sigueme-links">
      <a href="https://facebook.com/juan.prime.910777" target="_blank" class="sigueme-link facebook">
        <span>Facebook</span>
      </a>
      <a href="https://instagram.com/jprime_tf" target="_blank" class="sigueme-link instagram">
        <span>Instagram</span>
      </a>
      <a href="https://tiktok.com/@jprime.toys" target="_blank" class="sigueme-link tiktok">
        <span>TikTok</span>
      </a>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
